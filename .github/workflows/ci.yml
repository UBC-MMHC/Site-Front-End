name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# NODE_AUTH_TOKEN: For @ubc-mmhc/blog-frontend from GitHub Packages.
# Add GH_PACKAGES_READ_TOKEN secret (PAT with read:packages) in Settings > Secrets and variables > Actions.
env:
  NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ubc-mmhc"

      - name: Patch package-lock for GitHub Packages
        run: |
          node -e "
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const pkg = lock.packages['node_modules/@ubc-mmhc/blog-frontend'];
          const local = lock.packages['../blog-frontend'];
          if (pkg?.resolved?.includes('../blog-frontend') && local) {
            delete lock.packages['../blog-frontend'];
            lock.packages['node_modules/@ubc-mmhc/blog-frontend'] = {
              ...local,
              resolved: 'https://npm.pkg.github.com/download/@ubc-mmhc/blog-frontend/1.0.1/f5185b258400e4fc55f1af7ad57872343db4ccb8'
            };
            delete lock.packages['node_modules/@ubc-mmhc/blog-frontend'].link;
            fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2));
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ubc-mmhc"

      - name: Patch package-lock for GitHub Packages
        run: |
          node -e "
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const pkg = lock.packages['node_modules/@ubc-mmhc/blog-frontend'];
          const local = lock.packages['../blog-frontend'];
          if (pkg?.resolved?.includes('../blog-frontend') && local) {
            delete lock.packages['../blog-frontend'];
            lock.packages['node_modules/@ubc-mmhc/blog-frontend'] = {
              ...local,
              resolved: 'https://npm.pkg.github.com/download/@ubc-mmhc/blog-frontend/1.0.1/f5185b258400e4fc55f1af7ad57872343db4ccb8'
            };
            delete lock.packages['node_modules/@ubc-mmhc/blog-frontend'].link;
            fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2));
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: npm run lint -- --format stylish 2>&1 | tee eslint-output.txt

      - name: Report ESLint warnings
        if: always()
        run: |
          if [ -f eslint-output.txt ] && grep -q "warning" eslint-output.txt; then
            echo "::warning::ESLint found warnings. Please review the output above."
          fi

  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ubc-mmhc"

      - name: Patch package-lock for GitHub Packages
        run: |
          node -e "
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const pkg = lock.packages['node_modules/@ubc-mmhc/blog-frontend'];
          const local = lock.packages['../blog-frontend'];
          if (pkg?.resolved?.includes('../blog-frontend') && local) {
            delete lock.packages['../blog-frontend'];
            lock.packages['node_modules/@ubc-mmhc/blog-frontend'] = {
              ...local,
              resolved: 'https://npm.pkg.github.com/download/@ubc-mmhc/blog-frontend/1.0.1/f5185b258400e4fc55f1af7ad57872343db4ccb8'
            };
            delete lock.packages['node_modules/@ubc-mmhc/blog-frontend'].link;
            fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2));
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ubc-mmhc"

      - name: Patch package-lock for GitHub Packages
        run: |
          node -e "
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const pkg = lock.packages['node_modules/@ubc-mmhc/blog-frontend'];
          const local = lock.packages['../blog-frontend'];
          if (pkg?.resolved?.includes('../blog-frontend') && local) {
            delete lock.packages['../blog-frontend'];
            lock.packages['node_modules/@ubc-mmhc/blog-frontend'] = {
              ...local,
              resolved: 'https://npm.pkg.github.com/download/@ubc-mmhc/blog-frontend/1.0.1/f5185b258400e4fc55f1af7ad57872343db4ccb8'
            };
            delete lock.packages['node_modules/@ubc-mmhc/blog-frontend'].link;
            fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2));
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
